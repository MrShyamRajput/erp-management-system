{% extends "base.html" %}

{% block title %}
Create User
{% endblock %}

{% block content %}

<!-- Form -->
<form class="space-y-6 ">
<div class="grid grid-cols-1 gap-6 md:px-10">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant px-1" for="full_name">Full Name</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-[20px]" data-icon="person">person</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface border-0 rounded-lg text-on-surface placeholder:text-on-surface-variant/50 transition-all" id="full_name" placeholder="John Doe" type="text" name="name"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface border-0 rounded-lg text-on-surface placeholder:text-on-surface-variant/50 transition-all" id="email" placeholder="john.doe@architecterp.com" type="email" name="email"/>
</div>
</div>
<!-- Role -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant px-1" for="role">Role</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-[20px]" data-icon="shield_person">shield_person</span>
<select class="w-full pl-11 pr-4 py-3 bg-surface border-0 rounded-lg text-on-surface appearance-none transition-all" id="role" name="role">
<option disabled="" selected="" value="">Select user role</option>
<option value="admin">Admin</option>
<option value="hr">HR</option>
<option value="manager">Manager</option>
<option value="employee">Employee</option>
</select>

</div>
</div>
<!-- Passwords -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-11 py-3 bg-surface border-0 rounded-lg text-on-surface placeholder:text-on-surface-variant/50 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant px-1" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-[20px]" data-icon="lock_reset">lock_reset</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface border-0 rounded-lg text-on-surface placeholder:text-on-surface-variant/50 transition-all" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col md:flex-row-reverse gap-4">
<button class="w-full md:flex-1 py-4 px-6 bg-gradient-to-br from-primary to-primary-dim text-white font-bold rounded-xl shadow-[0px_4px_12px_rgba(0,82,220,0.2)] hover:shadow-[0px_8px_24px_rgba(0,82,220,0.3)] hover:-translate-y-0.5 active:scale-95 transition-all duration-200" type="submit">
                            Create User
                        </button>
<button class="w-full md:w-auto py-4 px-8 bg-surface-container text-on-surface-variant font-semibold rounded-xl hover:bg-surface-container-high transition-colors active:scale-95 duration-200" type="button">
                            Cancel
                        </button>
</div>
</form>

{% endblock %}
