<body class="bg-background font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- Hero Background with Subtle Gradients -->
<div class="fixed inset-0 -z-10 bg-grid-pattern overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-tertiary/5 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-[440px] transform transition-all duration-500">
<!-- Login Card -->
<div class="glass-effect rounded-xl border border-white/40 shadow-[0px_12px_32px_rgba(42,52,57,0.05)] p-8 md:p-10">
<!-- Brand Anchor & Header -->
<div class="flex flex-col items-center text-center mb-10">
<div class="w-14 h-14 bg-primary rounded-xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<h1 class="text-on-surface font-headline font-black tracking-tighter text-2xl mb-2">Architect ERP</h1>
<div class="space-y-1">
<h2 class="text-on-surface font-headline font-semibold text-xl tracking-tight">Welcome Back</h2>
<p class="text-on-surface-variant text-sm font-medium">Login to ERP Dashboard</p>
</div>
</div>


<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-lowest border-none rounded-lg text-on-surface text-sm placeholder-outline-variant focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all shadow-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between ml-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-11 pr-11 py-3.5 bg-surface-container-lowest border-none rounded-lg text-on-surface text-sm placeholder-outline-variant focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all shadow-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between">
<label class="flex items-center group cursor-pointer">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none h-5 w-5 border-2 border-surface-variant rounded-md checked:bg-primary checked:border-primary transition-all cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined absolute text-[14px] text-white opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none">check</span>
</div>
<span class="ml-2.5 text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:text-primary-dim transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold rounded-lg shadow-lg shadow-primary/25 hover:shadow-primary/35 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Login to Dashboard</span>
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant/50"></div>
</div>
<div class="relative flex justify-center text-xs font-semibold uppercase tracking-widest">
<span class="bg-white/10 backdrop-blur px-3 text-outline">or continue with</span>
</div>
</div>
<!-- Alternative Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-lowest border border-outline-variant/20 rounded-lg text-sm font-semibold text-on-surface hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<img alt="" class="w-5 h-5" data-alt="Official Google G logo in primary brand colors on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7JvLDp4D3Dh8xUopFX1ASGsvL9biXxTgFs_YHrPKa-VOmMccCr-7NhYPD_usybclD8Ma-1jPPPltbNmRWQMRL7SoRZ1RyT2c2mJFRGhiQ6sMy2E8hZD8b4QYKcrCJ4IREdzrSnsnQO6C6l60imkiuMK9YwLl_ByRsVcskqROrlcqGGr4uXxXCCOfloYCMQ4cJdSLukXc9JJbQO_C7mFQ2MSVJY3t0R4pYHEqe-N2ZIhr6wg2_C5lhiQ4XLX-CvD1nDaZMBRiTAe0"/>
<span>Login with Google</span>
</button>
</div>
<!-- Supporting Links -->
<p class="mt-8 text-center text-sm font-medium text-on-surface-variant">
                Don't have an account yet? 
                <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="#">Contact Administration</a>
</p>

<footer class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200/15 dark:border-slate-800/15 flex flex-col md:flex-row justify-between items-center px-8 py-6 w-full gap-4">
<div class="text-sm font-bold text-slate-700">© 2026 Architect ERP</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="text-xs font-medium text-slate-500 hover:text-slate-900 transition-colors cursor-pointer" href="#">Privacy Policy</a>
<a class="text-xs font-medium text-slate-500 hover:text-slate-900 transition-colors cursor-pointer" href="#">Terms of Service</a>
<a class="text-xs font-medium text-slate-500 hover:text-slate-900 transition-colors cursor-pointer" href="#">Contact Support</a>
</div>
</footer>
</body></html>
