<! DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Architect ERP{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#fe8983",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed": "#e4e2e6",
                        "primary-fixed-dim": "#c8d3ff",
                        "on-error": "#fff7f6",
                        "tertiary-fixed": "#dcd2f4",
                        "surface-container-low": "#f0f4f7",
                        "on-primary-fixed-variant": "#0050d5",
                        "tertiary-fixed-dim": "#cec5e5",
                        "inverse-surface": "#0b0f10",
                        "error-dim": "#4e0309",
                        "primary": "#0052dc",
                        "error": "#9f403d",
                        "on-tertiary": "#fdf7ff",
                        "surface-tint": "#0052dc",
                        "inverse-on-surface": "#9a9d9f",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#cfdce3",
                        "secondary": "#5f5f62",
                        "on-primary-container": "#0047c0",
                        "on-background": "#2a3439",
                        "surface": "#f7f9fb",
                        "tertiary-container": "#dcd2f4",
                        "on-secondary-container": "#515155",
                        "secondary-fixed-dim": "#d6d3d8",
                        "surface-container": "#e8eff3",
                        "inverse-primary": "#618bff",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#57506c",
                        "surface-container-highest": "#d9e4ea",
                        "primary-fixed": "#dbe1ff",
                        "on-surface-variant": "#566166",
                        "primary-container": "#dbe1ff",
                        "secondary-container": "#e4e2e6",
                        "on-secondary-fixed-variant": "#5b5b5f",
                        "on-surface": "#2a3439",
                        "tertiary": "#625b77",
                        "on-primary": "#f8f7ff",
                        "surface-container-high": "#e1e9ee",
                        "tertiary-dim": "#564f6b",
                        "on-primary-fixed": "#003798",
                        "outline": "#717c82",
                        "on-tertiary-container": "#4d4762",
                        "on-error-container": "#752121",
                        "surface-variant": "#d9e4ea",
                        "on-secondary": "#faf8fc",
                        "secondary-dim": "#535356",
                        "on-tertiary-fixed": "#3a344e",
                        "outline-variant": "#a9b4b9",
                        "on-secondary-fixed": "#3f3f43",
                        "primary-dim": "#0048c2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.02em;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            min-height: max(884px, 100dvh);
        }
    </style>

</head>

<body class="bg-surface text-on-surface antialiased overflow-x-hidden">

    <!-- SIDEBAR -->
    <aside
        class="fixed left-0 top-0 h-full z-40 hidden md:flex flex-col bg-slate-50 dark:bg-slate-900 h-screen w-64 border-r-0 font-inter tracking-tight">

        <div class="px-6 py-8">
            <h1 class="text-xl font-bold text-slate-900 dark:text-slate-50">Architect ERP</h1>
        </div>

        <nav class="flex-1 px-4 space-y-1">

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors"
                href="/dashboard">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors"
                href="/usermanagement">
                <span class="material-symbols-outlined">group</span>
                <span>User Management</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors"
                href="/hrmanagement">
                <span class="material-symbols-outlined">badge</span>
                <span>HR</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors"
                href="/inventory">
                <span class="material-symbols-outlined">inventory_2</span>
                <span>Inventory</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors" href="#">
                <span class="material-symbols-outlined">payments</span>
                <span>Sales</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors" href="#">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span>Procurement</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors" href="#">
                <span class="material-symbols-outlined">account_balance_wallet</span>
                <span>Finance</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-late-200 transition-colors" href="#">
                <span class="material-symbols-outlined">analytics</span>
                <span>Reports</span>
            </a>

            <a class="flex items-center gap-3 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-colors" href="#">
                <span class="material-symbols-outlined">settings</span>
                <span>Settings</span>
            </a>

        </nav>

    </aside>


    <!-- PAGE WRAPPER -->
    <div class="md:ml-64 flex flex-col min-h-screen   ">



        <!-- MAIN CONTENT -->
        {% block content %}
        {% endblock %}

        </main>

    </div>


    <!-- MOBILE NAV -->
    <nav
        class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t flex items-center justify-around py-3 px-2 z-40">

        <button class="flex flex-col items-center gap-1 text-slate-500">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px]">Dash</span>
        </button>

        <button class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined">group</span>
            <span class="text-[10px]">Users</span>
        </button>

        <button class="flex flex-col items-center gap-1 text-slate-500">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="text-[10px]">Stock</span>
        </button>

        <button class="flex flex-col items-center gap-1 text-slate-500">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px]">Config</span>
        </button>

    </nav>

</body>

</html>
